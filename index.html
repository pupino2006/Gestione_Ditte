<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT - Gestione Accessi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <nav id="home" class="app-container">
        <div class="brand-zone">
            <img src="pt.png" alt="Logo PT" class="app-logo">
            <h1>Gestione Accessi</h1>
            <p>Piattaforma Controllo Ingressi</p>
        </div>

        <div id="total-presenze-home" class="total-presenze"></div>

        <div class="dashboard-grid">
            <button class="dash-card card-blue" onclick="showSection('section-entrata')">
                <div class="card-content">
                    <span class="dash-icon">📥</span>
                    <span class="dash-label">Nuova Entrata</span>
                </div>
            </button>
            <button class="dash-card card-blue" onclick="showSection('section-uscita'); caricaPresenti();">
                <div class="card-content">
                    <span class="dash-icon">📤</span>
                    <span class="dash-label">Registra Uscita</span>
                </div>
            </button>
            <button class="dash-card card-dark" onclick="showSection('section-archivio'); caricaArchivio();">
                <div class="card-content">
                    <span class="dash-icon">📁</span>
                    <span class="dash-label">Archivio Storico</span>
                </div>
            </button>
        </div>
    </nav>

    <section id="section-entrata" class="app-container hidden">
        <div class="section-header">
            <button class="back-circle" onclick="showSection('home')">←</button>
            <h2>Ingresso Ditta</h2>
        </div>
        <div class="panel">
            <div class="input-group">
                <label>Seleziona Azienda</label>
                <select id="ent-azienda" onchange="gestisciSelezioneDitta()">
                    <option value="">Caricamento ditte...</option>
                </select>
            </div>

            <div class="input-group">
                <label>Numero Operatori</label>
                <input type="number" id="ent-operatori" value="1" min="1">
            </div>

            <button class="btn-confirm" onclick="salvaEntrata()">REGISTRA ENTRATA</button>
        </div>
    </section>

    <section id="section-uscita" class="app-container hidden">
        <div class="section-header">
            <button class="back-circle" onclick="showSection('home')">←</button>
            <h2>Ditte in Sede</h2>
        </div>
        <div id="lista-presenti" class="list-wrapper"></div>
    </section>

    <section id="section-archivio" class="app-container hidden">
        <div class="section-header">
            <button class="back-circle" onclick="showSection('home')">←</button>
            <h2>Storico</h2>
        </div>
        <div id="total-presenze-archive" class="total-presenze"></div>
        <div class="export-bar panel">
            <button onclick="downloadExcel()" class="btn-export">📊 Excel</button>
            <button onclick="downloadPDF()" class="btn-export">📄 PDF</button>
        </div>
        <div id="tabella-archivio" class="table-card"></div>
    </section>

    <!-- Modal per nuova ditta -->
    <div id="modal-nuova-ditta" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Aggiungi Nuova Ditta</h3>
                <button class="modal-close" onclick="chiudiModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label>Nome Azienda *</label>
                    <input type="text" id="modal-nome-azienda" placeholder="Inserisci il nome dell'azienda">
                </div>

                <div class="input-group">
                    <label>Telefono</label>
                    <input type="tel" id="modal-telefono" placeholder="Numero di telefono">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="modal-email" placeholder="Indirizzo email">
                </div>

                <div class="input-group">
                    <label>Note</label>
                    <textarea id="modal-note" placeholder="Note aggiuntive" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="chiudiModal()">Annulla</button>
                <button class="btn-confirm" onclick="salvaNuovaDitta()">Salva Ditta</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
