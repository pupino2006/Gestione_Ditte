<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PT - Gestione Accessi</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

    <nav id="home" class="app-container">
        <div class="brand-zone">
            <img src="pt.png" alt="Logo PT" class="app-logo">
            <h1>Gestione Accessi</h1>
            <p>Controllo Ingressi Ditte Esterne</p>
        </div>

        <div class="dashboard-grid">
            <button class="dash-card card-blue" onclick="showSection('section-entrata')">
                <span class="dash-icon">📥</span>
                <span class="dash-label">Nuova Entrata</span>
            </button>
            <button class="dash-card card-blue" onclick="showSection('section-uscita'); caricaPresenti();">
                <span class="dash-icon">📤</span>
                <span class="dash-label">Registra Uscita</span>
            </button>
            <button class="dash-card card-dark" onclick="showSection('section-archivio'); caricaArchivio();">
                <span class="dash-icon">📁</span>
                <span class="dash-label">Archivio</span>
            </button>
        </div>
    </nav>

    <section id="section-entrata" class="app-container hidden">
        <div class="section-header">
            <button class="back-circle" onclick="showSection('home')">←</button>
            <h2>Registra Ingresso</h2>
        </div>
        <div class="panel">
            <label>Seleziona Azienda</label>
            <select id="ent-azienda" onchange="gestisciSelezioneDitta()">
                <option value="">Caricamento ditte...</option>
            </select>

            <div id="nuova-ditta-container" style="display:none; margin-top:10px;">
                <input type="text" id="nuova-ditta" placeholder="Nome della nuova ditta" style="margin-bottom:10px;">
                <button class="btn-confirm" onclick="aggiungiDitta()" style="width:auto; padding:10px 20px;">Aggiungi Ditta</button>
            </div>

            <label>Numero Persone</label>
            <input type="number" id="ent-operatori" value="1" min="1">

            <button class="btn-confirm" onclick="salvaEntrata()">CONFERMA INGRESSO</button>
        </div>
    </section>

    <section id="section-uscita" class="app-container hidden">
        <div class="section-header">
            <button class="back-circle" onclick="showSection('home')">←</button>
            <h2>Ditte Presenti</h2>
        </div>
        <div id="lista-presenti"></div>
    </section>

    <section id="section-archivio" class="app-container hidden">
        <div class="section-header">
            <button class="back-circle" onclick="showSection('home')">←</button>
            <h2>Storico Accessi</h2>
        </div>
        <div class="panel action-bar">
            <button onclick="downloadExcel()" class="btn-alt">📊 Excel</button>
            <button onclick="downloadPDF()" class="btn-alt">📄 PDF</button>
        </div>
        <div id="tabella-archivio" class="table-container"></div>
    </section>

    <script src="app.js"></script>
</body>
</html>
